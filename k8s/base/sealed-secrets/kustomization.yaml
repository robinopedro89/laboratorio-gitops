apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Le decimos a Kustomize que instale este Helm Chart
helmCharts:
  - name: sealed-secrets
    repo: https://bitnami-labs.github.io/sealed-secrets
    version: 1.16.1  # Versión estable del chart
    releaseName: sealed-secrets
    namespace: kube-system # Lo instalamos en el namespace del sistema
