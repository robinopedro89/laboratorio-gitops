apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-menu-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/robinopedro89/laboratorio-gitops.git
    targetRevision: HEAD
    path: apps/production/menu-web/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev # <-- Burbuja aislada
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # <-- ¡Fundamental! Argo CD construirá el terreno